#
# gets() was present in C++98, deprecated in C++11, removed in C++14.
# Note that deprecated version behaves like "not present" because the
# test probes are compiled with -Wall -Werror.
# This case is intentionally WRONG until 18196 is fixed.
# The last part should be:  CXX98+ -CXX11+
#
func | std::gets				|\
	char *					|\
	char *					|\
	cstdio | CXX98+

#
# C99 functions - required in std:: since C++11.
# On illumos, GCC's <cstdio> also exposes these in C++98 via CXX_C99+
# (using -D_STDC_C99), but we test for what the standard requires.
#
func | std::snprintf					|\
	int						|\
	char *; size_t; const char *			|\
	cstdio | CXX11+
func | std::vsnprintf					|\
	int						|\
	char *; size_t; const char *; std::va_list	|\
	cstdio; cstdarg | CXX11+
func | std::vfscanf					|\
	int						|\
	FILE *; const char *; std::va_list		|\
	cstdio; cstdarg | CXX11+
func | std::vscanf					|\
	int						|\
	const char *; std::va_list			|\
	cstdio; cstdarg | CXX11+
func | std::vsscanf					|\
	int						|\
	const char *; const char *; std::va_list	|\
