#
# Design notes for <cstdio> test cases
#
# <cstdio> must provide all C90 stdio functions in namespace std::
# stdio_iso.h declares functions in namespace std:: and stdio_c99.h
# does NOT wrap in namespace std:: (todo: 18190), so C99 symbols
# only reach std:: via GCC's using-declarations in <cstdio>.
#

#
# Types - must be in std::
#
type | std::FILE	| cstdio | CXX98+
type | std::fpos_t	| cstdio | CXX98+
type | std::size_t	| cstdio | CXX98+

#
# C90 file functions - must be in std::
