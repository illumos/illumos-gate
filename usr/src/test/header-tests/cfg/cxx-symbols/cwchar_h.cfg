#
# Design notes for <cwchar> test cases
#
# <cwchar> must provide all C90/C99 wchar functions in namespace std::
# wchar_iso.h declares functions in namespace std::; wchar_c99.h
# does NOT wrap in namespace std:: (todo: 18190), so C99 symbols only
# reach std:: via GCC's using-declarations in <cwchar>.
#

#
# Types - must be in std::
#
type | std::mbstate_t	| cwchar | CXX98+
type | std::size_t	| cwchar | CXX98+
type | std::wint_t	| cwchar | CXX98+
type | std::tm		| cwchar | CXX98+

