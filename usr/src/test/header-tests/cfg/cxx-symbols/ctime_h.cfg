#
# Design notes for <ctime> test cases
#
# <ctime> must provide all C90 time functions in namespace std::
# time_iso.h declares all functions in namespace std::
# there are no C99 additions to time.h on illumos.
# C++17 adds struct timespec and timespec_get (from C11).
#

#
# Types - must be in std::
#
type | std::clock_t	| ctime | CXX98+
type | std::time_t	| ctime | CXX98+
type | std::tm		| ctime | CXX98+
type | std::size_t	| ctime | CXX98+
type | std::timespec	| ctime | CXX17+

#
# C90 functions - must be in std::
#
func | std::clock						|\
	clock_t							|\
								|\
	ctime | CXX98+
func | std::time						|\
	time_t							|\
	time_t *						|\
	ctime | CXX98+
func | std::mktime						|\
	time_t							|\
	struct tm *						|\
	ctime | CXX98+
func | std::difftime						|\
	double							|\
	time_t; time_t						|\
	ctime | CXX98+
func | std::asctime						|\
	char *							|\
	const struct tm *					|\
	ctime | CXX98+
func | std::ctime						|\
	char *							|\
	const time_t *						|\
	ctime | CXX98+
func | std::gmtime						|\
	struct tm *						|\
	const time_t *						|\
	ctime | CXX98+
func | std::localtime						|\
	struct tm *						|\
	const time_t *						|\
	ctime | CXX98+
func | std::strftime						|\
	size_t							|\
	char *; size_t; const char *; const struct tm *		|\
	ctime | CXX98+

#
# C++17 additions (from C11)
#
func | std::timespec_get					|\
	int							|\
	struct timespec *; int					|\
	ctime | CXX17+
