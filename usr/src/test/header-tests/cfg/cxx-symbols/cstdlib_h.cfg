#
# Design notes for <cstdlib> test cases
#
# <cstdlib> must provide all C90 stdlib functions in namespace std::.
# C99 stdlib functions require the C99 compilation environment.
# C11 stdlib functions require the C11 compilation environment.
#

#
# Types - must be in std::
#
type | std::div_t	| cstdlib | CXX98+
type | std::ldiv_t	| cstdlib | CXX98+
type | std::size_t	| cstdlib | CXX98+
type | std::lldiv_t	| cstdlib | CXX11+

#
