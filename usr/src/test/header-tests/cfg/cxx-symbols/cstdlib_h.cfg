	int				|\
	const char *; size_t		|\
	cstdlib | CXX98+
func | std::mbtowc			|\
	int				|\
	wchar_t *; const char *; size_t	|\
	cstdlib | CXX98+
func | std::wctomb			|\
	int				|\
	char *; wchar_t			|\
	cstdlib | CXX98+
func | std::mbstowcs			|\
	size_t				|\
	wchar_t *; const char *; size_t	|\
	cstdlib | CXX98+
func | std::wcstombs			|\
	size_t				|\
	char *; const wchar_t *; size_t	|\
	cstdlib | CXX98+

#
# C++ overloads for abs and div with long - must be in std::
#
func | std::abs			|\
	long			|\
	long			|\
	cstdlib | CXX98+
func | std::div			|\
	ldiv_t			|\
	long; long		|\
	cstdlib | CXX98+

#
# Regression tests for 15209 - see cmath_h.cfg for details.
# abs(double) must not be ambiguous.
#
func | abs			|\
	int			|\
	int			|\
	cstdlib | CXX98+
func | abs			|\
	long			|\
	long			|\
	cstdlib | CXX98+
func | abs			|\
	double			|\
	double			|\
	cstdlib | CXX98+

