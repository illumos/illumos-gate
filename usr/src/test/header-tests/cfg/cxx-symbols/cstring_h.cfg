#
# Design notes for <cstring> test cases
#
# <cstring>  must provide all C90 string functions in namespace std::.
# string_iso.h declares all functions in namespace std:: and <cstring>
# exposes them.
#
# The C++ standard (ISO/IEC 14882) requires that memchr, strchr, strpbrk,
# strrchr, and strstr each have two overloads: one returning const pointer
# (when given const input) and one returning non-const pointer.  These are
# handled by inline C++ wrappers in string_iso.h.
#

#
# Types - must be in std::
#
type | std::size_t	| cstring | CXX98+

#
# Memory functions - must be in std::
#
func | std::memcmp				|\
	int					|\
	const void *; const void *; size_t	|\
	cstring | CXX98+
func | std::memcpy				|\
	void *					|\
	void *; const void *; size_t		|\
	cstring | CXX98+
func | std::memmove				|\
	void *					|\
	void *; const void *; size_t		|\
	cstring | CXX98+
func | std::memset				|\
	void *					|\
	void *; int; size_t			|\
	cstring | CXX98+
func | std::memchr				|\
	const void *				|\
	const void *; int; size_t		|\
	cstring | CXX98+

#
# String functions - must be in std::
#
func | std::strcat				|\
	char *					|\
	char *; const char *			|\
	cstring | CXX98+
func | std::strchr				|\
	const char *				|\
	const char *; int			|\
	cstring | CXX98+
func | std::strcmp				|\
	int					|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strcoll				|\
	int					|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strcpy				|\
	char *					|\
	char *; const char *			|\
	cstring | CXX98+
func | std::strcspn				|\
	size_t					|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strerror				|\
	char *					|\
	int					|\
	cstring | CXX98+
func | std::strlen				|\
	size_t					|\
	const char *				|\
	cstring | CXX98+
func | std::strncat				|\
	char *					|\
	char *; const char *; size_t		|\
	cstring | CXX98+
func | std::strncmp				|\
	int					|\
	const char *; const char *; size_t	|\
	cstring | CXX98+
func | std::strncpy				|\
	char *					|\
	char *; const char *; size_t		|\
	cstring | CXX98+
func | std::strpbrk				|\
	const char *				|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strrchr				|\
	const char *				|\
	const char *; int			|\
	cstring | CXX98+
func | std::strspn				|\
	size_t					|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strstr				|\
	const char *				|\
	const char *; const char *		|\
	cstring | CXX98+
func | std::strtok				|\
	char *					|\
	char *; const char *			|\
	cstring | CXX98+
func | std::strxfrm				|\
	size_t					|\
	char *; const char *; size_t		|\
	cstring | CXX98+
