#
# Design notes for <cmath> test cases
#
# <cmath> must provide all math functions in the "std::" namespace. The
# global "::" namespace gets only the double form of those functions.
# Reference: https://en.cppreference.com/cpp/header/cmath
#
# C90 functions available in std:: since C++98.
# C99 functions (acosh, exp2, log2, round, trunc, hypot, fma, etc.)
# required in std:: since C++11.
#

#
# Types - must be in std:: since C++11
#
type | std::float_t	| cmath | CXX11+
type | std::double_t	| cmath | CXX11+

