#
# Regression test for 15209: log(int) must not be ambiguous. Before
# 15209, math_iso.h pulled logf/logl into :: via using-declarations,
# making log(int) ambiguous between float and double overloads.
# Integer arguments must resolve to the double overload unambiguously.
# This section also adds test cases representing problems seen when
# building third-party packages via pkgsrc.org including failures
# due to ambiguity with abs() in cstdlib.
#
func | log	| double | int			| cmath | CXX98+
func | log	| double | long int		| cmath | CXX98+
func | log	| double | unsigned long	| cmath | CXX98+
func | log10	| double | int			| cmath | CXX98+
func | fabs	| double | int			| cmath | CXX98+
func | floor	| double | int			| cmath | CXX98+
func | sqrt	| double | int			| cmath | CXX98+
func | sqrt	| double | long int		| cmath | CXX98+
func | sqrt	| double | unsigned int		| cmath | CXX98+
func | sqrt	| double | unsigned long	| cmath | CXX98+
func | pow	| double | int; int		| cmath | CXX98+
func | pow	| double | double; long double	| cmath | CXX98+
func | atan2	| double | int; int		| cmath | CXX98+
func | abs	| double | double		| cmath | CXX11+
func | abs	| int    | int			| cmath | CXX11+
func | abs	| long   | long int		| cmath | CXX11+

