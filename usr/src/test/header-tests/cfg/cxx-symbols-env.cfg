#
# Compilation environments for C++ symbol visibility tests.
#
# Each environment specifies a C++ standard and optional preprocessor
# definitions.  The _C99 variants add -D_STDC_C99 to expose C99 math
# declarations enabled by feature-test macros.  Group names ending
# with "+" include all standards from that version forward.
#

env | CXX98		| c++98 |
env | CXX11		| c++11 |
env | CXX14		| c++14 |
env | CXX17		| c++17 |
env | CXX20		| c++20 |

env | CXX98_C99		| c++98 | -D_STDC_C99
env | CXX11_C99		| c++11 | -D_STDC_C99
env | CXX14_C99		| c++14 | -D_STDC_C99
env | CXX17_C99		| c++17 | -D_STDC_C99
env | CXX20_C99		| c++20 | -D_STDC_C99

env_group | CXX98+	| CXX20 CXX17 CXX14 CXX11 CXX98
env_group | CXX11+	| CXX20 CXX17 CXX14 CXX11
env_group | CXX17+	| CXX20 CXX17
env_group | CXX_C99+	| CXX20_C99 CXX17_C99 CXX14_C99 CXX11_C99 CXX98_C99
